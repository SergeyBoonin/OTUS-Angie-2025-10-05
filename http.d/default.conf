#
# Using map for rewrite
#
map $uri $v_new_uri {
    ~.* /alternative_index.html;
}

server {
    listen       80;
    server_name  localhost;

    location / {
        root static_site;  
        #
        # Using a variable defined by map for internal redirection
        #
        rewrite ^.*$ $v_new_uri break;
        index  index.html index.htm;
    }

    location /assets/ {
        #
        # Taking assets from the alternative folder
        #
        alias static_site/alternative_path_for_assets/;
    }

    location /error/ {
        alias static_site/error/;
    }

    location ~* .(jpg|png|gif)$ {
        #
        # External edirection to the alternative site for the pictures
        #
        return 302 $scheme://$host:81$request_uri;
    }

    location /status/ {
        api     /status/;
        allow   127.0.0.1;
        deny    all;
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/angie/html;
    }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
    #
    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    #
    #location ~ \.php$ {
    #    root           html;
    #    fastcgi_pass   127.0.0.1:9000;
    #    fastcgi_index  index.php;
    #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
    #    include        fastcgi_params;
    #}

    # deny access to .htaccess files, if Apache's document root
    # concurs with angie's one
    #
    #location ~ /\.ht {
    #    deny  all;
    #}
}

server {
    listen       81;
    server_name  localhost;

    location / {
        root static_site;
    }
}
